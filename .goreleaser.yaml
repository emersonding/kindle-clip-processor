version: 2
project_name: kindle-clip
builds:
  - id: kindle-clip
    main: ./cmd/kindle-clip
    binary: kindle-clip
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
archives:
  - id: default
    builds:
      - kindle-clip
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
release:
  draft: true
